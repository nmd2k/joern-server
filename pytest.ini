[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    integration: marks tests as requiring external services (deselect with '-m "not integration"')
    stress: marks tests as load/stress testing (deselect with '-m "not stress"')
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
