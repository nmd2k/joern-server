global
  log stdout format raw local0
  maxconn 4096

defaults
  mode http
  log global
  option httplog
  option dontlognull
  # Clients (e.g. httpx) reuse keep-alive to HAProxy. Without closing the server leg
  # after each response, HAProxy may pin one Joern replica for that whole client TCP
  # session, so different X-Session-Id headers on the same connection incorrectly
  # share one interpreter. Per-request server selection restores sticky routing.
  option http-server-close
  timeout connect 10s
  timeout client  3600s
  timeout server  3600s
  retries 2

frontend fe_joern
  bind *:8080
  default_backend be_joern

backend be_joern
  balance roundrobin
  option httpchk GET /health
  http-check expect status 200

  # Prefer caller-provided session key; fallback to source IP.
  # Send X-Session-Id from your app for strongest stickiness.
  stick-table type string len 128 size 100k expire 2h
  http-request set-var(txn.sticky_key) req.hdr(X-Session-Id)
  http-request set-var(txn.sticky_key) src if !{ var(txn.sticky_key) -m found }
  stick on var(txn.sticky_key)

  # Discover joern replicas created by:
  #   docker compose -f deploy/docker-compose.router.yml up -d --scale joern=<N>
  # Upper bound here is template slots (adjust if needed).
  server-template joern 20 joern:8080 check resolvers docker init-addr libc,none inter 3s fall 3 rise 2

resolvers docker
  nameserver dns 127.0.0.11:53
  accepted_payload_size 8192
  hold valid 5s
