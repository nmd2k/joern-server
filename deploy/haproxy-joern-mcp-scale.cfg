global
  log stdout format raw local0
  maxconn 4096

defaults
  mode http
  log global
  option httplog
  option dontlognull
  timeout connect 10s
  timeout client  3600s
  timeout server  3600s
  retries 2

#──────────────────────────────────────────────────────────────────────────────
# Port 8080 — Joern HTTP proxy
#
# Sticky routing by X-Session-Id: the Joern REPL holds loaded CPG state in
# memory, so importCpg() and subsequent cpg.* queries MUST reach the same
# replica.  Close the server leg after every response so keep-alive
# connections can still be re-routed when the session key changes.
#──────────────────────────────────────────────────────────────────────────────
frontend fe_joern_http
  bind *:8080
  option http-server-close
  default_backend be_joern_http

backend be_joern_http
  balance roundrobin
  option http-server-close
  option httpchk GET /health
  http-check expect status 200

  # Prefer caller-supplied X-Session-Id; fall back to source IP.
  stick-table type string len 128 size 100k expire 2h
  http-request set-var(txn.sticky_key) req.hdr(X-Session-Id)
  http-request set-var(txn.sticky_key) src if !{ var(txn.sticky_key) -m found }
  stick on var(txn.sticky_key)

  # Expose which replica handled the request (used by stress-test analysis).
  http-response set-header X-Served-By %[srv_name]

  # Docker DNS discovery — up to 20 slots; extras auto-disabled until populated.
  server-template joern 20 joern:8080 check resolvers docker init-addr libc,none inter 3s fall 3 rise 2

#──────────────────────────────────────────────────────────────────────────────
# Port 9000 — MCP SSE server (FastMCP)
#
# FastMCP SSE transport:
#   GET  /sse             — opens long-lived SSE event stream
#   POST /messages/       — sends JSON-RPC tool calls for the active session
#
# Source-IP affinity ensures both legs of the same SSE session (GET /sse and
# its POST /messages/) reach the same replica.  The tunnel timeout prevents
# HAProxy from cutting idle SSE streams before they are finished.
#
# NOTE: In single-host testing all workers share the same source IP, so all
# MCP traffic goes to one replica.  In production (multiple client hosts) the
# distribution is proportional to client count.
#──────────────────────────────────────────────────────────────────────────────
frontend fe_mcp_sse
  bind *:9000
  default_backend be_mcp_sse

backend be_mcp_sse
  balance roundrobin

  # Source-IP stickiness glues GET /sse and POST /messages/ to one replica.
  stick-table type ip size 100k expire 2h
  stick on src

  # Long-lived SSE streams must not be evicted by idle timeouts.
  timeout tunnel 3600s

  # Expose which replica handled MCP calls.
  http-response set-header X-Served-By %[srv_name]

  # TCP-connect health check (MCP SSE server has no /health endpoint).
  server-template joern 20 joern:9000 check inter 5s fall 3 rise 2 resolvers docker init-addr libc,none

#──────────────────────────────────────────────────────────────────────────────
# Docker embedded DNS — available at 127.0.0.11 inside any user-defined
# Docker network.  Returns one A record per live replica when queried for the
# service name "joern".
#──────────────────────────────────────────────────────────────────────────────
resolvers docker
  nameserver dns 127.0.0.11:53
  accepted_payload_size 8192
  hold valid    5s
  hold other   10s
  hold refused 10s
  resolve_retries 3
