# Scaled Joern behind HAProxy with Docker DNS discovery.
#
# Usage (from repo root):
#   docker compose -f deploy/docker-compose.haproxy-scale.yml up -d --scale joern=<N>
#
# External entry points (both published by joern-haproxy, not by joern containers):
#   http://localhost:8080  →  Joern HTTP proxy  (parse / query-sync / health / cleanup)
#   http://localhost:9000  →  MCP SSE server    (all MCP tool calls via FastMCP)
#
# Network design:
#   • All joern replicas on joern-net — no host ports published.
#   • joern-haproxy on joern-net — Docker DNS (127.0.0.11) resolves "joern" to all replicas.
#   • X-Session-Id header → HAProxy sticky table → same Joern REPL for stateful CPG queries.
#   • MCP SSE sessions (port 9000) sticky by source IP.
#   • Shared cpg-out volume: CPGs written by any replica are visible to all
#     (safe because session affinity routes a client's load_cpg + queries to the same replica).

networks:
  joern-net:
    driver: bridge

services:
  joern:
    image: neuralatlas-joern:${JOERN_IMAGE_TAG:-local}
    # Expose internally only — HAProxy publishes 8080/9000 to the host.
    expose:
      - "8080"
      - "9000"
    networks:
      - joern-net
    volumes:
      - ../ingest:/workspace/ingest:ro
      - joern-workspace:/workspace/joern-workspace
      - cpg-out:/workspace/cpg-out
    environment:
      JOERN_SERVER_HOST: "0.0.0.0"
      JOERN_INTERNAL_PORT: "${JOERN_INTERNAL_PORT:-18080}"
      JOERN_QUERY_TIMEOUT_SEC: "${JOERN_QUERY_TIMEOUT_SEC:-600}"
      JOERN_JAVA_XMX: "${JOERN_JAVA_XMX:-4g}"
      JOERN_SERVER_AUTH_USERNAME: "${JOERN_SERVER_AUTH_USERNAME:-}"
      JOERN_SERVER_AUTH_PASSWORD: "${JOERN_SERVER_AUTH_PASSWORD:-}"
      PROXY_PORT: "8080"
      MCP_PORT: "9000"
      MCP_HOST: "0.0.0.0"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: "${JOERN_MEMORY_LIMIT:-8g}"
        reservations:
          memory: 2g
    healthcheck:
      test: ["CMD", "/usr/local/bin/joern-healthcheck.sh"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    labels:
      autoheal: "true"
    restart: unless-stopped

  joern-haproxy:
    image: haproxy:2.9
    container_name: joern-haproxy
    ports:
      - "${JOERN_HTTP_PORT:-8080}:8080"
      - "${JOERN_MCP_PORT:-9000}:9000"
    volumes:
      - ./haproxy-joern-mcp-scale.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - joern-net
    depends_on:
      joern:
        condition: service_started
    restart: unless-stopped

  autoheal:
    image: willfarrell/autoheal
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "${AUTOHEAL_INTERVAL:-10}"
      AUTOHEAL_START_PERIOD: "${AUTOHEAL_START_PERIOD:-180}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  joern-workspace:
  cpg-out:
